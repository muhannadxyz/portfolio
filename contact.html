<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"/>
  <meta name="theme-color" content="#0B0C0F"/>
  <title>Contact — Muhannad Abuzahrieh</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">
  <style>
    :root {
      --bg:        #0B0C0F;
      --surface:   #131619;
      --surface2:  #1A1D22;
      --border:    #22262D;
      --border2:   #343A45;
      --text:      #E8E9EB;
      --text2:     #8C9099;
      --text3:     #4E535C;
      --green:     #23D18B;
      --purple:    #6366F1;
      --topbar-h:  44px;
      --sidebar-w: 200px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ── */
    .rw-topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; z-index: 200; gap: 12px;
    }
    .rw-topbar-left { display: flex; align-items: center; gap: 8px; }
    .rw-avatar {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .rw-topbar-name { font-size: 13px; font-weight: 500; color: var(--text); text-decoration: none; }
    .rw-topbar-sep  { font-size: 13px; color: var(--text3); }
    .rw-topbar-env {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px;
      font-size: 12px; font-weight: 500; color: var(--text2); cursor: default;
    }
    .rw-topbar-right { display: flex; align-items: center; gap: 6px; }

    /* ── Sidebar ── */
    .rw-sidebar {
      position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 10px 8px; gap: 2px; z-index: 200;
    }
    .rw-sidebar-btn {
      width: 100%; height: 34px;
      display: flex; align-items: center; gap: 9px;
      background: transparent; border: none; cursor: pointer;
      border-radius: 7px; color: var(--text3);
      padding: 0 10px; text-align: left;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .rw-sidebar-btn:hover { background: var(--surface2); color: var(--text2); }
    .rw-sidebar-btn.active { background: var(--surface2); color: var(--text); }
    .rw-sidebar-btn svg { flex-shrink: 0; }
    .rw-sidebar-label { font-size: 13px; font-weight: 500; }
    .rw-sidebar-ext {
      margin-left: auto; font-size: 10px; color: var(--text3); opacity: 0;
      transition: opacity 0.15s;
    }
    .rw-sidebar-btn:hover .rw-sidebar-ext { opacity: 1; }
    .rw-sidebar-sep { width: 100%; height: 1px; background: var(--border); margin: 6px 0; }

    /* ── Main content ── */
    .rw-main {
      position: fixed;
      top: var(--topbar-h); left: var(--sidebar-w); right: 0; bottom: 0;
      overflow-y: auto;
      background: var(--bg);
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .contact-inner {
      width: 100%;
      max-width: 560px;
      padding: 48px 32px 80px;
    }

    /* ── Header ── */
    .contact-kicker {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 12px;
    }
    .contact-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }
    .contact-sub {
      font-size: 0.875rem;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* ── Success message ── */
    .success-msg {
      display: none;
      background: rgba(35, 209, 139, 0.08);
      border: 1px solid rgba(35, 209, 139, 0.25);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .form-label .req { color: var(--text3); margin-left: 3px; }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      transition: border-color 0.15s, background 0.15s;
      outline: none;
    }
    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--border2);
      background: var(--surface2);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--text3);
      font-size: 13px;
    }
    .form-textarea {
      resize: vertical;
      min-height: 140px;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* ── Submit ── */
    .submit-btn {
      width: 100%;
      padding: 11px 20px;
      background: var(--purple);
      color: #fff;
      border: 1px solid var(--purple);
      border-radius: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #5254CC; border-color: #5254CC; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Divider ── */
    .rw-divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* ── Scrollbar ── */
    .rw-main::-webkit-scrollbar { width: 6px; }
    .rw-main::-webkit-scrollbar-track { background: transparent; }
    .rw-main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Mobile ── */
    @media (max-width: 800px) {
      .rw-sidebar { display: none; }
      .rw-main { left: 0; }
      .contact-inner { padding: 32px 20px 60px; }
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <header class="rw-topbar">
    <div class="rw-topbar-left">
      <div class="rw-avatar">M</div>
      <a href="index.html" class="rw-topbar-name">muhannad</a>
      <span class="rw-topbar-sep">›</span>
      <div class="rw-topbar-env">contact</div>
    </div>
    <nav class="rw-topbar-right"></nav>
  </header>

  <!-- Sidebar -->
  <aside class="rw-sidebar">
    <a href="index.html" class="rw-sidebar-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
      </svg>
      <span class="rw-sidebar-label">Projects</span>
    </a>
    <a href="about.html" class="rw-sidebar-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="rw-sidebar-label">About Me</span>
    </a>
    <a href="contact.html" class="rw-sidebar-btn active">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M1 5l7 5 7-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="rw-sidebar-label">Contact</span>
    </a>
    <div class="rw-sidebar-sep"></div>
    <a href="https://www.linkedin.com/in/muhannad-abuzahrieh-0b7330265/" target="_blank" rel="noreferrer" class="rw-sidebar-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M4 7v5M4 4.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M7 12V9c0-1.105.895-2 2-2s2 .895 2 2v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="rw-sidebar-label">LinkedIn</span>
      <span class="rw-sidebar-ext">↗</span>
    </a>
    <a href="https://github.com/muhannadxyz" target="_blank" rel="noreferrer" class="rw-sidebar-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      <span class="rw-sidebar-label">GitHub</span>
      <span class="rw-sidebar-ext">↗</span>
    </a>
  </aside>

  <!-- Main -->
  <main class="rw-main">
    <div class="contact-inner">

      <p class="contact-kicker">Get in touch</p>
      <h1 class="contact-title">Contact</h1>
      <p class="contact-sub">Open to new opportunities, projects, and partnerships. Fill out the form and I'll get back to you.</p>

      <div id="successMsg" class="success-msg">✓ Message sent successfully</div>

      <form id="contactForm" action="https://formspree.io/f/mzzodeyq" method="POST">
        <input type="hidden" name="_subject" value="New Portfolio Contact Form Submission">
        <input type="text" name="_gotcha" style="display:none">

        <div class="form-group">
          <label class="form-label" for="name">Name <span class="req">*</span></label>
          <input type="text" id="name" name="name" class="form-input" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" name="email" class="form-input" placeholder="john@company.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="company">Company / Organization</label>
          <input type="text" id="company" name="company" class="form-input" placeholder="Company name">
        </div>

        <div class="form-group">
          <label class="form-label" for="subject">Subject <span class="req">*</span></label>
          <input type="text" id="subject" name="subject" class="form-input" placeholder="Job opportunity / project inquiry" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="message">Message <span class="req">*</span></label>
          <textarea id="message" name="message" class="form-textarea" placeholder="Tell me about your project or opportunity..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>

    </div>
  </main>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('success') === 'true') {
        document.getElementById('successMsg').style.display = 'block';
        setTimeout(() => {
          document.getElementById('successMsg').style.display = 'none';
          window.history.replaceState({}, document.title, window.location.pathname);
        }, 5000);
      }
    });

    document.getElementById('contactForm').addEventListener('submit', function() {
      const btn = this.querySelector('.submit-btn');
      btn.textContent = 'Sending...';
      btn.disabled = true;
    });
  </script>

</body>
</html>
