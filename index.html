<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"/>
  <meta name="theme-color" content="#0B0C0F"/>
  <title>Muhannad Abuzahrieh</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Variables ── */
    :root {
      --bg:        #0B0C0F;
      --surface:   #131619;
      --surface2:  #1A1D22;
      --border:    #22262D;
      --border2:   #343A45;
      --text:      #E8E9EB;
      --text2:     #8C9099;
      --text3:     #4E535C;
      --green:     #23D18B;
      --topbar-h:  44px;
      --sidebar-w: 48px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg) !important;
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden !important;
      height: 100vh !important;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ── */
    .rw-topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; z-index: 200; gap: 12px;
    }
    .rw-topbar-left { display: flex; align-items: center; gap: 8px; }
    .rw-avatar {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .rw-topbar-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .rw-topbar-sep  { font-size: 13px; color: var(--text3); }
    .rw-topbar-env {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px;
      font-size: 12px; font-weight: 500; color: var(--text2); cursor: default;
    }
    .rw-topbar-env::after { content: '▾'; font-size: 9px; color: var(--text3); }
    .rw-topbar-right { display: flex; align-items: center; gap: 6px; }
    .rw-topnav-link {
      font-size: 13px; color: var(--text2); text-decoration: none;
      padding: 4px 10px; border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .rw-topnav-link:hover { background: var(--surface2); color: var(--text); }
    .rw-topnav-btn {
      font-size: 13px; font-weight: 500; color: var(--text);
      background: var(--surface2); border: 1px solid var(--border2);
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      text-decoration: none; transition: background 0.15s, border-color 0.15s;
    }
    .rw-topnav-btn:hover { background: #252830; border-color: #555D6A; }

    /* ── Sidebar ── */
    .rw-sidebar {
      position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 0; gap: 2px; z-index: 200;
    }
    .rw-sidebar-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      border-radius: 7px; color: var(--text3);
      transition: background 0.15s, color 0.15s;
    }
    .rw-sidebar-btn:hover { background: var(--surface2); color: var(--text2); }
    .rw-sidebar-btn.active { background: var(--surface2); color: var(--text); }
    .rw-sidebar-sep { width: 22px; height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Canvas area ── */
    .rw-main {
      position: fixed;
      top: var(--topbar-h); left: var(--sidebar-w); right: 0; bottom: 0;
      overflow: hidden;
    }
    .rw-canvas-bg {
      width: 100%; height: 100%;
      background-color: var(--bg);
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      cursor: grab; position: relative; overflow: hidden;
    }
    .rw-canvas-bg.grabbing { cursor: grabbing; }
    /* Edge vignette */
    .rw-canvas-bg::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(11,12,15,0.75) 100%);
    }
    .rw-canvas {
      position: absolute; top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }
    .rw-edges {
      position: absolute; top: 0; left: 0;
      pointer-events: none; overflow: visible;
    }

    /* ── Node cards ── */
    .rw-node {
      position: absolute; width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer; user-select: none;
      opacity: 0;
      animation: nodeIn 0.45s cubic-bezier(0.34,1.3,0.64,1) forwards;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .rw-node:hover {
      border-color: var(--border2);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 8px 28px rgba(0,0,0,0.55);
      z-index: 10;
    }
    @keyframes nodeIn {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }
    .rw-node-inner { padding: 14px 14px 12px; }
    .rw-node-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .rw-node-icon {
      width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; letter-spacing: -0.5px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .rw-node-meta { flex: 1; min-width: 0; }
    .rw-node-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3; margin-bottom: 3px;
    }
    .rw-node-sub {
      font-size: 11px; color: var(--text3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: 'IBM Plex Mono', monospace;
    }
    .rw-node-footer {
      display: flex; align-items: center; gap: 6px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .rw-status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .rw-status-dot.live {
      background: var(--green);
      animation: pulseDot 2.5s ease-in-out infinite;
    }
    .rw-status-dot.github { background: var(--text3); }
    .rw-status-dot.local  { background: #3B82F6; }
    @keyframes pulseDot {
      0%,100% { box-shadow: 0 0 0 0   rgba(35,209,139,0.4); }
      50%     { box-shadow: 0 0 0 4px rgba(35,209,139,0);   }
    }
    .rw-status-text { font-size: 11px; color: var(--text2); }

    /* ── Edge lines ── */
    .rw-edge {
      stroke: rgba(255,255,255,0.065); stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 10;
      animation: flowEdge 2.2s linear infinite;
    }
    @keyframes flowEdge { to { stroke-dashoffset: -16; } }

    /* ── Bottom controls ── */
    .rw-controls {
      position: fixed; bottom: 18px;
      left: calc(var(--sidebar-w) + 14px);
      display: flex; align-items: center; gap: 4px; z-index: 300;
    }
    .rw-ctrl-group {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .rw-ctrl-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: var(--text2); cursor: pointer; font-size: 15px;
      transition: background 0.12s, color 0.12s;
    }
    .rw-ctrl-btn:hover { background: var(--surface2); color: var(--text); }
    .rw-ctrl-divider { width: 1px; height: 18px; background: var(--border); }
    .rw-ctrl-pill {
      font-size: 11px; color: var(--text3);
      font-family: 'IBM Plex Mono', monospace;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; height: 32px; padding: 0 10px;
      display: flex; align-items: center;
    }

    /* ── Hint toast ── */
    .rw-hint {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: var(--text3);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      pointer-events: none; white-space: nowrap;
      animation: hintFade 4.5s ease forwards; z-index: 300;
    }
    @keyframes hintFade {
      0%,50% { opacity: 1; } 100% { opacity: 0; }
    }

    /* ── Mobile fallback ── */
    @media (max-width: 700px) {
      .rw-sidebar { display: none; }
      .rw-main { left: 0; overflow-y: auto; }
      .rw-canvas-bg {
        cursor: default; background-image: none; overflow: auto;
        min-height: calc(100vh - var(--topbar-h));
      }
      .rw-canvas {
        position: relative; transform: none !important;
        display: flex; flex-direction: column;
        align-items: center; gap: 12px; padding: 24px 16px;
      }
      .rw-node {
        position: relative !important; left: auto !important; top: auto !important;
        width: 100%; max-width: 360px;
      }
      .rw-edges { display: none; }
      .rw-controls { display: none; }
      .rw-hint { display: none; }
      .rw-canvas-bg::after { display: none; }
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <header class="rw-topbar">
    <div class="rw-topbar-left">
      <div class="rw-avatar">M</div>
      <span class="rw-topbar-name">muhannad</span>
      <span class="rw-topbar-sep">›</span>
      <div class="rw-topbar-env">portfolio</div>
    </div>
    <nav class="rw-topbar-right">
      <a href="about.html" class="rw-topnav-link">About</a>
      <a href="contact.html" class="rw-topnav-btn">Contact</a>
    </nav>
  </header>

  <!-- Sidebar -->
  <aside class="rw-sidebar">
    <button class="rw-sidebar-btn active" title="Projects">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
      </svg>
    </button>
    <div class="rw-sidebar-sep"></div>
    <button class="rw-sidebar-btn" title="About" onclick="location.href='about.html'">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M3 13.5C3 11.015 5.239 9 8 9s5 2.015 5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="rw-sidebar-btn" title="Contact" onclick="location.href='contact.html'">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M1.5 5.5l6.5 4 6.5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </aside>

  <!-- Canvas -->
  <main class="rw-main">
    <div class="rw-canvas-bg" id="canvasBg">
      <div class="rw-canvas" id="rwCanvas">
        <svg id="edgeLayer" class="rw-edges" width="2400" height="2400"></svg>
        <!-- nodes injected by JS -->
      </div>
    </div>
  </main>

  <!-- Bottom controls -->
  <div class="rw-controls">
    <div class="rw-ctrl-group">
      <button class="rw-ctrl-btn" id="ctrlFit" title="Fit to screen">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 4.5V1.5h3M9 1.5h3v3M12 8.5v3H9M4 12H1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="rw-ctrl-divider"></div>
      <button class="rw-ctrl-btn" id="ctrlZoomIn"  title="Zoom in">+</button>
      <div class="rw-ctrl-divider"></div>
      <button class="rw-ctrl-btn" id="ctrlZoomOut" title="Zoom out">−</button>
    </div>
    <div class="rw-ctrl-pill" id="zoomLabel">85%</div>
    <div class="rw-ctrl-pill" id="svcCount">— projects</div>
  </div>

  <!-- Drag hint -->
  <div class="rw-hint" id="rwHint">Drag to explore &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click to open</div>

  <!-- ── Project Modal ── -->
  <div id="project-overlay" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Project details" data-close="true">
    <div class="modalCard" role="document">
      <button class="modalClose" type="button" data-close="true" aria-label="Close">✕</button>
      <div class="modalMedia" id="modalMedia">
        <button class="expandMediaBtn" id="expandMediaBtn" type="button" aria-label="Expand preview">
          <span class="expandIcon">⛶</span>
        </button>
      </div>
      <div class="expandedMediaOverlay" id="expandedMediaOverlay" style="display:none;">
        <button class="collapseMediaBtn" id="collapseMediaBtn" type="button" aria-label="Collapse preview">
          <span class="collapseIcon">✕</span>
        </button>
        <div class="expandedMediaContent" id="expandedMediaContent"></div>
      </div>
      <div class="modalBody">
        <div class="detailHeader">
          <div class="detailIcon" id="detailIcon">⌘</div>
          <div>
            <h2 class="detailTitle" id="detailTitle">Project Title</h2>
            <div class="detailMetaRow">
              <div class="metaBlock">
                <div class="metaLabel">Location</div>
                <div class="metaValue" id="detailLocation">—</div>
              </div>
              <div class="metaBlock">
                <div class="metaLabel">Date</div>
                <div class="metaValue" id="detailDate">—</div>
              </div>
            </div>
            <div class="chips" id="detailChips"></div>
          </div>
        </div>
        <section class="detailSection">
          <h3 class="sectionTitle">Project Overview</h3>
          <div class="overviewCard" id="detailOverview"></div>
          <div class="overviewLink" id="detailOverviewLink" style="display:none;">
            <div id="detailLinksContainer" style="display:flex;flex-wrap:wrap;gap:0.5rem;"></div>
          </div>
        </section>
        <section class="detailSection" id="releasesSection" hidden>
          <h3 class="sectionTitle">Releases</h3>
          <div class="list" id="detailReleases"></div>
        </section>
        <section class="detailSection" id="tweetsSection" hidden>
          <h3 class="sectionTitle">Popular on Twitter</h3>
          <div class="tweetGrid" id="detailTweets"></div>
        </section>
        <section class="detailSection" id="highlightsSection" hidden>
          <h3 class="sectionTitle">Highlights</h3>
          <ul class="bullets" id="detailHighlights"></ul>
        </section>
        <div class="expandPageContainer" id="expandPageContainer" style="display:none;">
          <a href="#" id="expandPageLink" class="expandPageButton">
            <span>Expand Page</span><span class="linkArrow">↗</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/projects/project-loader.js"></script>
  <script src="js/projects/portfolio-os.js"></script>
  <script src="js/projects/lucentir.js"></script>
  <script src="js/projects/shadoconnect.js"></script>
  <script src="js/projects/rentwise.js"></script>
  <script src="js/projects/wifi-analyzer.js"></script>
  <script src="js/projects/wind-turbine.js"></script>
  <script src="js/projects/postnote.js"></script>
  <script src="js/projects/ghost-job-checker.js"></script>
  <script src="js/projects/jat.js"></script>
  <script src="js/projects/fluxdesk.js"></script>
  <script src="js/projects/rx-check.js"></script>
  <script src="js/project-updates.js"></script>

  <script>
    // ── Modal helpers ──────────────────────────────────────────────────────
    function formatDateLong(iso) {
      if (!iso) return "—";
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString(undefined, { year:"numeric", month:"long", day:"numeric" });
    }
    function setSectionVisible(id, v) {
      const el = document.getElementById(id);
      if (!el) return;
      if (v) el.removeAttribute("hidden"); else el.setAttribute("hidden","");
    }
    function closeModal() {
      const o = document.getElementById("project-overlay");
      if (o) { o.setAttribute("aria-hidden","true"); o.style.display=""; document.documentElement.style.overflow=""; }
    }
    function setupMediaExpand(project) {
      const expandBtn     = document.getElementById("expandMediaBtn");
      const collapseBtn   = document.getElementById("collapseMediaBtn");
      const expandedOvl   = document.getElementById("expandedMediaOverlay");
      const expandedCont  = document.getElementById("expandedMediaContent");
      const modalMedia    = document.getElementById("modalMedia");
      if (!expandBtn||!collapseBtn||!expandedOvl||!expandedCont||!modalMedia) return;
      const nb = expandBtn.cloneNode(true);
      expandBtn.parentNode.replaceChild(nb, expandBtn);
      nb.addEventListener("click", e => { e.stopPropagation(); expandMedia(modalMedia, expandedCont, expandedOvl); });
      collapseBtn.addEventListener("click", e => { e.stopPropagation(); collapseMedia(expandedOvl); });
      expandedOvl.addEventListener("click", e => { if (e.target===expandedOvl) collapseMedia(expandedOvl); });
      function onEsc(e) {
        if (e.key==="Escape" && expandedOvl.style.display!=="none") { e.stopPropagation(); collapseMedia(expandedOvl); }
      }
      document.removeEventListener("keydown", onEsc, true);
      document.addEventListener("keydown", onEsc, true);
    }
    function expandMedia(modalMedia, expandedCont, expandedOvl) {
      const src = modalMedia.querySelector("img,iframe");
      if (!src) return;
      const clone = src.cloneNode(true);
      clone.style.cssText = src.tagName==="IMG" ? "width:100%;height:100%;object-fit:contain;" : "width:100%;height:100%;border:none;";
      expandedCont.innerHTML = "";
      expandedCont.appendChild(clone);
      expandedOvl.style.display = "flex";
      document.documentElement.style.overflow = "hidden";
      setTimeout(() => document.getElementById("collapseMediaBtn")?.focus(), 100);
    }
    function collapseMedia(expandedOvl) {
      if (!expandedOvl) expandedOvl = document.getElementById("expandedMediaOverlay");
      if (expandedOvl) {
        expandedOvl.style.display = "none";
        const ec = document.getElementById("expandedMediaContent");
        if (ec) ec.innerHTML = "";
        const m = document.getElementById("project-overlay");
        if (m && m.getAttribute("aria-hidden")==="true") document.documentElement.style.overflow = "";
      }
    }
    function openProject(p) {
      if (!p) return;
      const overlay = document.getElementById("project-overlay");
      if (!overlay) return;
      overlay.setAttribute("aria-hidden","false");
      overlay.style.display = "flex";
      document.documentElement.style.overflow = "hidden";
      // Media
      const mm = document.getElementById("modalMedia");
      if (mm) {
        const hasIframe = p.link && p.link.includes('os.html');
        mm.innerHTML = (hasIframe
          ? `<iframe src="${p.link}" style="width:100%;height:100%;border:none;" title="${p.title||''} preview"></iframe>`
          : `<img src="${p.thumb||''}" alt="${p.title||''} preview" />`)
          + '<button class="expandMediaBtn" id="expandMediaBtn" type="button" aria-label="Expand preview"><span class="expandIcon">⛶</span></button>';
      }
      setupMediaExpand(p);
      // Icon
      const di = document.getElementById("detailIcon");
      if (di) {
        if (p.icon && !p.icon.includes('<')) di.textContent = p.icon;
        else if (p.logo && !p.logo.includes('<')) di.textContent = p.logo;
        else di.textContent = (p.title||'P').charAt(0).toUpperCase();
      }
      const dt = document.getElementById("detailTitle");      if (dt) dt.textContent = p.title||"Untitled";
      const dl = document.getElementById("detailLocation");   if (dl) dl.textContent = p.location||"—";
      const dd = document.getElementById("detailDate");       if (dd) dd.textContent = formatDateLong(p.date);
      // Chips
      const chips = document.getElementById("detailChips");
      if (chips) {
        const items = [];
        if (p.role) items.push(`Role: ${p.role}`);
        if (Array.isArray(p.stack)) items.push(...p.stack);
        chips.innerHTML = items.map(c=>`<span class="chip">${c}</span>`).join("");
      }
      // Overview
      const ov = document.getElementById("detailOverview");
      if (ov) ov.textContent = p.overview || p.description || "No overview yet.";
      // Links
      const ovLink = document.getElementById("detailOverviewLink");
      const lc     = document.getElementById("detailLinksContainer");
      if (ovLink && lc) {
        let list = Array.isArray(p.links) && p.links.length ? p.links : (p.link ? [{label:'View Project',url:p.link}] : []);
        if (list.length) {
          lc.innerHTML = list.map(l => {
            const ext = l.url && (l.url.startsWith('http://') || l.url.startsWith('https://'));
            return `<a href="${l.url}" target="${ext?'_blank':'_self'}" ${ext?'rel="noopener noreferrer"':''} class="projectLink"><span>${l.label||'View Project'}</span><span class="linkArrow">↗</span></a>`;
          }).join('');
          ovLink.style.display = 'block';
        } else { ovLink.style.display = 'none'; }
      }
      // Expand page
      const epc = document.getElementById("expandPageContainer");
      const epl = document.getElementById("expandPageLink");
      if (epc && epl) {
        const lu = p.link || (Array.isArray(p.links) && p.links.length ? p.links[0].url : null);
        if (lu && !lu.startsWith('http')) { epl.href = lu; epc.style.display = 'block'; }
        else epc.style.display = 'none';
      }
      // Releases
      const rels = Array.isArray(p.releases) ? p.releases : [];
      setSectionVisible("releasesSection", rels.length > 0);
      const re = document.getElementById("detailReleases");
      if (re) re.innerHTML = rels.map(r=>`<div class="releaseItem"><p class="releaseTitle">${r.title||''}</p>${r.note?`<p class="releaseNote">${r.note}</p>`:''}${r.url&&r.url!=='#'?`<a class="releaseLink" href="${r.url}" target="_blank" rel="noreferrer">↗ View</a>`:''}</div>`).join('');
      // Tweets
      const tw = Array.isArray(p.tweets) ? p.tweets : [];
      setSectionVisible("tweetsSection", tw.length > 0);
      const te = document.getElementById("detailTweets");
      if (te) te.innerHTML = tw.map(t=>`<div class="tweetCard"><div class="tweetTop"><div class="tweetAuthor"><div class="tweetName">${t.author||''}</div><div class="tweetHandle">${t.handle||''}</div></div><div>𝕏</div></div>${t.text?`<div class="tweetText">${t.text}</div>`:''}${t.media?`<div class="tweetMedia"><img src="${t.media}" alt="" loading="lazy"/></div>`:''}${t.url&&t.url!=='#'?`<a class="tweetLink" href="${t.url}" target="_blank" rel="noreferrer">↗ Open on X</a>`:''}</div>`).join('');
      // Highlights
      const hl = Array.isArray(p.highlights) ? p.highlights : [];
      setSectionVisible("highlightsSection", hl.length > 0);
      const he = document.getElementById("detailHighlights");
      if (he) he.innerHTML = hl.map(h=>`<li>${h}</li>`).join('');
    }
    // Modal close listeners
    document.getElementById("project-overlay").addEventListener("click", e => {
      if (e.target?.dataset?.close === "true") closeModal();
    });
    window.addEventListener("keydown", e => {
      const o = document.getElementById("project-overlay");
      if (e.key==="Escape" && o && o.getAttribute("aria-hidden")==="false") closeModal();
    });

    // ── Canvas state ───────────────────────────────────────────────────────
    const canvasBg = document.getElementById('canvasBg');
    const rwCanvas = document.getElementById('rwCanvas');
    const NODE_W = 220, NODE_H = 114;
    const PAD = 700; // offset so all logical coords are positive

    let tx = 0, ty = 0, scale = 0.85;
    let dragging = false, lastX = 0, lastY = 0;

    function applyTransform(animated) {
      if (animated) {
        rwCanvas.style.transition = 'transform 0.38s cubic-bezier(0.4,0,0.2,1)';
        setTimeout(() => { rwCanvas.style.transition = ''; }, 420);
      } else { rwCanvas.style.transition = ''; }
      rwCanvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
      document.getElementById('zoomLabel').textContent = Math.round(scale*100) + '%';
    }
    function resetView() {
      tx = canvasBg.offsetWidth  / 2 - PAD * scale;
      ty = canvasBg.offsetHeight / 2 - PAD * scale;
    }

    // ── Node positions (logical, centered at 0,0) ─────────────────────────
    const nodeLayout = {
      'portfolio-os':      { x:   0,  y: -370 },
      'lucentir':          { x: -430, y: -190 },
      'shadoconnect':      { x:  300, y: -220 },
      'ghost-job-checker': { x:  -80, y:  -65 },
      'wifi-analyzer':     { x: -510, y:  110 },
      'rentwise':          { x:  170, y:   90 },
      'jat':               { x:  470, y:   10 },
      'fluxdesk':          { x: -460, y:  310 },
      'wind-turbine':      { x: -120, y:  360 },
      'postnote':          { x:  200, y:  340 },
      'rx-check':          { x:  480, y:  260 },
    };

    // ── Edges ─────────────────────────────────────────────────────────────
    const EDGES = [
      ['jat',               'ghost-job-checker'],
      ['ghost-job-checker', 'lucentir'],
      ['shadoconnect',      'rentwise'],
      ['rentwise',          'fluxdesk'],
      ['rx-check',          'postnote'],
    ];

    function getNodeUrl(p) {
      if (!p.link) return '';
      if (p.link.startsWith('http')) {
        try { return new URL(p.link).hostname.replace('www.',''); } catch { return ''; }
      }
      return p.link;
    }
    function getStatus(p) {
      if (!p.link) return { cls:'github', label:'GitHub' };
      if (p.link.startsWith('http')) return { cls:'live', label:'Live' };
      return { cls:'local', label:'Local' };
    }
    function getIcon(p) {
      const l = p.logo || '';
      if (l && !l.includes('<')) return l;
      return (p.title||'P').charAt(0).toUpperCase();
    }

    function buildNode(project, delay) {
      const pos = nodeLayout[project.slug] || { x: Math.random()*600-300, y: Math.random()*400-200 };
      const st  = getStatus(project);
      const col = project.brandColor || '#6366F1';
      const node = document.createElement('div');
      node.className = 'rw-node';
      node.dataset.slug = project.slug;
      node.style.left = (PAD + pos.x - NODE_W/2) + 'px';
      node.style.top  = (PAD + pos.y - NODE_H/2) + 'px';
      node.style.animationDelay = delay + 'ms';
      node.innerHTML = `
        <div class="rw-node-inner">
          <div class="rw-node-header">
            <div class="rw-node-icon" style="background:${col}1A;color:${col};border:1px solid ${col}30;">${getIcon(project)}</div>
            <div class="rw-node-meta">
              <div class="rw-node-title">${project.title}</div>
              <div class="rw-node-sub">${getNodeUrl(project) || project.company || ''}</div>
            </div>
          </div>
          <div class="rw-node-footer">
            <span class="rw-status-dot ${st.cls}"></span>
            <span class="rw-status-text">${st.label}</span>
          </div>
        </div>`;
      node.addEventListener('click', e => {
        e.stopPropagation();
        node.style.borderColor = col;
        setTimeout(() => { node.style.borderColor = ''; }, 250);
        openProject(project);
      });
      return node;
    }

    function drawEdges() {
      const svg = document.getElementById('edgeLayer');
      svg.innerHTML = '';
      EDGES.forEach(([a, b]) => {
        const la = nodeLayout[a]; const lb = nodeLayout[b];
        if (!la || !lb) return;
        const x1 = PAD + la.x; const y1 = PAD + la.y;
        const x2 = PAD + lb.x; const y2 = PAD + lb.y;
        const dy = y2 - y1;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M${x1} ${y1} C${x1} ${y1+dy*0.5} ${x2} ${y2-dy*0.5} ${x2} ${y2}`);
        path.setAttribute('class', 'rw-edge');
        svg.appendChild(path);
      });
    }

    function initProjects() {
      const projects = [
        window.PortfolioOSProject, window.LucentirProject, window.ShadoconnectProject,
        window.RentwiseProject,    window.WifiAnalyzerProject, window.WindTurbineProject,
        window.PostNoteProject,    window.GhostJobCheckerProject, window.JATProject,
        window.FluxdeskProject,    window.RxCheckProject,
      ].filter(Boolean);

      document.getElementById('svcCount').textContent = `${projects.length} projects`;

      projects.forEach((p, i) => {
        rwCanvas.appendChild(buildNode(p, 80 + i * 55));
      });

      drawEdges();
      resetView();
      applyTransform(false);
    }

    // ── Pan ────────────────────────────────────────────────────────────────
    canvasBg.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (e.target.closest('.rw-node')) return;
      dragging = true; lastX = e.clientX; lastY = e.clientY;
      canvasBg.classList.add('grabbing');
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      tx += e.clientX - lastX; ty += e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      applyTransform(false);
    });
    window.addEventListener('mouseup', () => { dragging = false; canvasBg.classList.remove('grabbing'); });

    // ── Zoom ───────────────────────────────────────────────────────────────
    canvasBg.addEventListener('wheel', e => {
      e.preventDefault();
      const d = e.deltaY > 0 ? 0.9 : 1.1;
      const r = canvasBg.getBoundingClientRect();
      const cx = e.clientX - r.left;
      const cy = e.clientY - r.top;
      tx = cx + (tx - cx) * d;
      ty = cy + (ty - cy) * d;
      scale = Math.min(Math.max(scale * d, 0.2), 3);
      applyTransform(false);
    }, { passive: false });

    // ── Touch pan ──────────────────────────────────────────────────────────
    let ltx = 0, lty = 0;
    canvasBg.addEventListener('touchstart', e => {
      if (e.touches.length===1) { ltx = e.touches[0].clientX; lty = e.touches[0].clientY; }
    }, { passive: true });
    canvasBg.addEventListener('touchmove', e => {
      if (e.touches.length===1) {
        tx += e.touches[0].clientX - ltx; ty += e.touches[0].clientY - lty;
        ltx = e.touches[0].clientX; lty = e.touches[0].clientY;
        applyTransform(false);
      }
    }, { passive: true });

    // ── Controls ───────────────────────────────────────────────────────────
    document.getElementById('ctrlZoomIn') .addEventListener('click', () => { scale = Math.min(scale*1.2,3);   applyTransform(true); });
    document.getElementById('ctrlZoomOut').addEventListener('click', () => { scale = Math.max(scale*0.8,0.2); applyTransform(true); });
    document.getElementById('ctrlFit')    .addEventListener('click', () => { scale = 0.85; resetView();       applyTransform(true); });

    window.addEventListener('load', initProjects);
  </script>
</body>
</html>
