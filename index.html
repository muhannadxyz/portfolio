<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"/>
  <meta name="theme-color" content="#0B0C0F"/>
  <title>Muhannad Abuzahrieh</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Variables ── */
    :root {
      --bg:        #0B0C0F;
      --surface:   #131619;
      --surface2:  #1A1D22;
      --border:    #22262D;
      --border2:   #343A45;
      --text:      #E8E9EB;
      --text2:     #8C9099;
      --text3:     #4E535C;
      --green:     #23D18B;
      --topbar-h:  44px;
      --sidebar-w: 200px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg) !important;
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden !important;
      height: 100vh !important;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ── */
    .rw-topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; z-index: 200; gap: 12px;
    }
    .rw-topbar-left { display: flex; align-items: center; gap: 8px; }
    .rw-avatar {
      width: 22px; height: 22px;
      border-radius: 50%; overflow: hidden; flex-shrink: 0;
    }
    .rw-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rw-topbar-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .rw-topbar-sep  { font-size: 13px; color: var(--text3); }
    .rw-topbar-env {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px;
      font-size: 12px; font-weight: 500; color: var(--text2); cursor: default;
    }
    .rw-topbar-env::after { content: '▾'; font-size: 9px; color: var(--text3); }
    .rw-topbar-right { display: flex; align-items: center; gap: 6px; }
    .rw-topnav-link {
      font-size: 13px; color: var(--text2); text-decoration: none;
      padding: 4px 10px; border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .rw-topnav-link:hover { background: var(--surface2); color: var(--text); }
    .rw-topnav-btn {
      font-size: 13px; font-weight: 500; color: var(--text);
      background: var(--surface2); border: 1px solid var(--border2);
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      text-decoration: none; transition: background 0.15s, border-color 0.15s;
    }
    .rw-topnav-btn:hover { background: #252830; border-color: #555D6A; }

    /* ── Sidebar ── */
    .rw-sidebar {
      position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 10px 8px; gap: 2px; z-index: 200;
    }
    .rw-sidebar-btn {
      width: 100%; height: 34px;
      display: flex; align-items: center; gap: 9px;
      background: transparent; border: none; cursor: pointer;
      border-radius: 7px; color: var(--text3) !important;
      padding: 0 10px; text-align: left;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      font-family: 'Inter', system-ui, sans-serif;
      box-sizing: border-box; -webkit-appearance: none; appearance: none;
    }
    .rw-sidebar-btn:hover { background: var(--surface2); color: var(--text2) !important; }
    .rw-sidebar-btn.active { background: var(--surface2); color: var(--text) !important; }
    .rw-sidebar-btn svg { flex-shrink: 0; }
    .rw-sidebar-label { font-size: 13px; font-weight: 500; }
    .rw-sidebar-ext {
      margin-left: auto; font-size: 10px; color: var(--text3); opacity: 0;
      transition: opacity 0.15s;
    }
    .rw-sidebar-btn:hover .rw-sidebar-ext { opacity: 1; }
    .rw-sidebar-sep { width: 100%; height: 1px; background: var(--border); margin: 6px 0; }

    /* ── Canvas area ── */
    .rw-main {
      position: fixed;
      top: var(--topbar-h); left: var(--sidebar-w); right: 0; bottom: 0;
      overflow: hidden;
    }
    .rw-canvas-bg {
      width: 100%; height: 100%;
      background-color: var(--bg);
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      cursor: grab; position: relative; overflow: hidden;
    }
    .rw-canvas-bg.grabbing { cursor: grabbing; }
    /* Nether stars */
    .nether-star {
      position: absolute; border-radius: 50%; pointer-events: none;
      background: #fff; z-index: 1;
      animation: starTwinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--del);
    }
    @keyframes starTwinkle {
      0%,100% { opacity: 0.04; transform: scale(1); }
      50% { opacity: var(--peak); transform: scale(var(--grow)); }
    }
    /* Edge vignette */
    .rw-canvas-bg::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(11,12,15,0.75) 100%);
    }
    .rw-canvas {
      position: absolute; top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }
    .rw-edges {
      position: absolute; top: 0; left: 0;
      pointer-events: none; overflow: visible;
    }

    /* ── Node cards ── */
    .rw-node {
      position: absolute; width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer; user-select: none;
      opacity: 0;
      animation: nodeIn 0.45s cubic-bezier(0.34,1.3,0.64,1) forwards;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .rw-node:hover {
      border-color: var(--border2);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 8px 28px rgba(0,0,0,0.55);
      z-index: 10;
    }
    @keyframes nodeIn {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }
    .rw-node-inner { padding: 14px 14px 12px; }
    .rw-node-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .rw-node-icon {
      width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; letter-spacing: -0.5px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .rw-node-meta { flex: 1; min-width: 0; }
    .rw-node-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      line-height: 1.3; margin-bottom: 3px;
    }
    .rw-node-sub {
      font-size: 11px; color: var(--text3);
      font-family: 'IBM Plex Mono', monospace;
      line-height: 1.35;
    }
    .rw-node-footer {
      display: flex; align-items: center; gap: 6px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .rw-status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .rw-status-dot.live {
      background: var(--green);
      animation: pulseDot 2.5s ease-in-out infinite;
    }
    .rw-status-dot.github { background: var(--text3); }
    .rw-status-dot.local  { background: #3B82F6; }
    @keyframes pulseDot {
      0%,100% { box-shadow: 0 0 0 0   rgba(35,209,139,0.4); }
      50%     { box-shadow: 0 0 0 4px rgba(35,209,139,0);   }
    }
    .rw-status-text { font-size: 11px; color: var(--text2); }

    /* ── About Me hub node ── */
    .rw-node.hub {
      width: 240px;
      border-color: #6366F1;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.15), 0 0 28px rgba(99,102,241,0.12);
    }
    .rw-node.hub:hover {
      border-color: #818CF8;
      box-shadow: 0 0 0 1px rgba(129,140,248,0.25), 0 8px 32px rgba(99,102,241,0.25);
    }
    .rw-hub-body { padding: 16px 14px 14px; }
    .rw-hub-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .rw-hub-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      overflow: hidden;
    }
    .rw-hub-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rw-hub-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .rw-hub-role { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }
    .rw-hub-bio {
      font-size: 11px; color: var(--text2); line-height: 1.6;
      margin-bottom: 10px;
    }
    .rw-hub-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .rw-hub-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
      background: rgba(34,209,139,0.12); color: var(--green);
      border: 1px solid rgba(34,209,139,0.25);
      border-radius: 20px; padding: 3px 8px;
    }
    .rw-hub-link {
      font-size: 11px; color: var(--text3);
      text-decoration: none; transition: color 0.15s;
    }
    .rw-hub-link:hover { color: var(--text2); }

    /* ── Edge lines ── */
    .rw-edge {
      stroke: rgba(255,255,255,0.065); stroke-width: 1.5; fill: none;
      stroke-dasharray: 6 10;
      animation: flowEdge 2.2s linear infinite;
    }
    @keyframes flowEdge { to { stroke-dashoffset: -16; } }

    /* ── Bottom controls ── */
    .rw-controls {
      position: fixed; bottom: 18px;
      left: calc(var(--sidebar-w) + 14px);
      display: flex; align-items: center; gap: 4px; z-index: 300;
    }
    .rw-ctrl-group {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .rw-ctrl-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: var(--text2) !important; cursor: pointer; font-size: 15px;
      transition: background 0.12s, color 0.12s;
    }
    .rw-ctrl-btn:hover { background: var(--surface2); color: var(--text) !important; }
    .rw-ctrl-divider { width: 1px; height: 18px; background: var(--border); }
    .rw-ctrl-pill {
      font-size: 11px; color: var(--text3);
      font-family: 'IBM Plex Mono', monospace;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; height: 32px; padding: 0 10px;
      display: flex; align-items: center;
    }

    /* ── Chat bot button active state ── */
    #chatToggleBtn.active { background: rgba(99,102,241,0.18); box-shadow: 0 0 0 1px rgba(99,102,241,0.35) inset; }

    /* ── Chat panel ── */
    .rw-chat-panel {
      position: fixed;
      bottom: 58px;
      left: calc(var(--sidebar-w) + 14px);
      width: 340px;
      max-height: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; flex-direction: column;
      z-index: 400;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      transform: translateY(8px) scale(0.97);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.2s cubic-bezier(0.34,1.3,0.64,1), opacity 0.18s ease;
    }
    .rw-chat-panel.open {
      transform: translateY(0) scale(1);
      opacity: 1;
      pointer-events: all;
    }
    .rw-chat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .rw-chat-bot-icon {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      overflow: hidden;
    }
    .rw-chat-bot-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rw-chat-header-text { flex: 1; }
    .rw-chat-header-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .rw-chat-header-sub  { font-size: 10px; color: var(--green); font-family: 'IBM Plex Mono', monospace; }
    .rw-chat-close {
      width: 22px; height: 22px; border-radius: 5px; border: none;
      background: transparent; color: var(--text3) !important; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .rw-chat-close:hover { background: var(--surface2); color: var(--text2) !important; }
    .rw-chat-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .rw-chat-messages::-webkit-scrollbar { width: 4px; }
    .rw-chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .rw-chat-msg {
      max-width: 88%; font-size: 12.5px; line-height: 1.55;
      padding: 8px 11px; border-radius: 10px;
    }
    .rw-chat-msg.bot {
      background: var(--surface2); color: var(--text2);
      border: 1px solid var(--border); border-radius: 10px 10px 10px 3px;
      align-self: flex-start;
    }
    .rw-chat-msg.user {
      background: rgba(99,102,241,0.18); color: var(--text);
      border: 1px solid rgba(99,102,241,0.25); border-radius: 10px 10px 3px 10px;
      align-self: flex-end;
    }
    .rw-chat-msg.bot a { color: #818CF8; text-decoration: none; }
    .rw-chat-msg.bot a:hover { text-decoration: underline; }
    .rw-chat-typing {
      display: flex; gap: 4px; align-items: center;
      padding: 8px 11px; align-self: flex-start;
    }
    .rw-chat-typing span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text3); display: inline-block;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .rw-chat-typing span:nth-child(2) { animation-delay: 0.2s; }
    .rw-chat-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .rw-chat-pills {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 0 12px 10px; flex-shrink: 0;
    }
    .rw-chat-pill {
      font-size: 11px; color: var(--text3);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 9px; cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .rw-chat-pill:hover { color: var(--text2); border-color: var(--border2); }
    .rw-chat-input-row {
      display: flex; gap: 6px; padding: 10px 12px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .rw-chat-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 10px;
      color: var(--text); font-size: 12.5px;
      font-family: 'Inter', system-ui, sans-serif;
      outline: none; transition: border-color 0.15s;
    }
    .rw-chat-input:focus { border-color: var(--border2); }
    .rw-chat-input::placeholder { color: var(--text3); }
    .rw-chat-send {
      width: 30px; height: 30px; border-radius: 7px; border: none;
      background: var(--purple); color: #fff; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .rw-chat-send:hover { background: #5254CC; }

    /* ── Hint toast ── */
    .rw-hint {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: var(--text3);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      pointer-events: none; white-space: nowrap;
      animation: hintFade 4.5s ease forwards; z-index: 300;
    }
    @keyframes hintFade {
      0%,50% { opacity: 1; } 100% { opacity: 0; }
    }

    /* ── Mobile fallback ── */
    @media (max-width: 800px) {
      .rw-sidebar { display: none; }
      .rw-main { left: 0; overflow-y: auto; }
      .rw-canvas-bg {
        cursor: default; background-image: none; overflow: auto;
        min-height: calc(100vh - var(--topbar-h));
      }
      .rw-canvas {
        position: relative; transform: none !important;
        display: flex; flex-direction: column;
        align-items: center; gap: 12px; padding: 24px 16px;
      }
      .rw-node {
        position: relative !important; left: auto !important; top: auto !important;
        width: 100%; max-width: 360px;
      }
      .rw-edges { display: none; }
      .rw-controls { display: none; }
      .rw-hint { display: none; }
      .rw-canvas-bg::after { display: none; }
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <header class="rw-topbar">
    <div class="rw-topbar-left">
      <div class="rw-avatar"><img src="favicon/android-chrome-192x192.png" alt="MA"></div>
      <span class="rw-topbar-name">muhannad</span>
      <span class="rw-topbar-sep">›</span>
      <div class="rw-topbar-env">portfolio</div>
    </div>
    <nav class="rw-topbar-right"></nav>
  </header>

  <!-- Sidebar -->
  <aside class="rw-sidebar">
    <!-- Projects (current page) -->
    <button class="rw-sidebar-btn active">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
      </svg>
      <span class="rw-sidebar-label">Projects</span>
    </button>

    <div class="rw-sidebar-sep"></div>

    <!-- About Me -->
    <a href="about.html" class="rw-sidebar-btn">

      <span class="rw-sidebar-label">About Me</span>
    </a>

    <!-- Contact -->
    <a href="contact.html" class="rw-sidebar-btn">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M1.5 5.5l6.5 4 6.5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="rw-sidebar-label">Contact</span>
    </a>

    <div class="rw-sidebar-sep"></div>

    <!-- LinkedIn -->
    <a href="https://www.linkedin.com/in/muhannad-abuzahrieh-0b7330265/" target="_blank" rel="noreferrer" class="rw-sidebar-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <span class="rw-sidebar-label">LinkedIn</span>
      <span class="rw-sidebar-ext">↗</span>
    </a>

    <!-- GitHub -->

  <script src="js/projects/fluxdesk.js"></script>

  <script>
    // ── Modal helpers ──────────────────────────────────────────────────────
    function formatDateLong(iso) {
      if (!iso) return "—";
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString(undefined, { year:"numeric", month:"long", day:"numeric" });
    }
    function setSectionVisible(id, v) {
      const el = document.getElementById(id);
      if (!el) return;
      if (v) el.removeAttribute("hidden"); else el.setAttribute("hidden","");
    }
    function closeModal() {
      const o = document.getElementById("project-overlay");
      if (o) { o.setAttribute("aria-hidden","true"); o.style.display=""; document.documentElement.style.overflow=""; }
    }
    function setupMediaExpand(project) {
      const expandBtn     = document.getElementById("expandMediaBtn");
      const collapseBtn   = document.getElementById("collapseMediaBtn");
      const expandedOvl   = document.getElementById("expandedMediaOverlay");
      const expandedCont  = document.getElementById("expandedMediaContent");
      const modalMedia    = document.getElementById("modalMedia");
      if (!expandBtn||!collapseBtn||!expandedOvl||!expandedCont||!modalMedia) return;
      const nb = expandBtn.cloneNode(true);
      expandBtn.parentNode.replaceChild(nb, expandBtn);
      nb.addEventListener("click", e => { e.stopPropagation(); expandMedia(modalMedia, expandedCont, expandedOvl); });
      collapseBtn.addEventListener("click", e => { e.stopPropagation(); collapseMedia(expandedOvl); });
      expandedOvl.addEventListener("click", e => { if (e.target===expandedOvl) collapseMedia(expandedOvl); });
      function onEsc(e) {
        if (e.key==="Escape" && expandedOvl.style.display!=="none") { e.stopPropagation(); collapseMedia(expandedOvl); }
      }
      document.removeEventListener("keydown", onEsc, true);
      document.addEventListener("keydown", onEsc, true);
    }
    function expandMedia(modalMedia, expandedCont, expandedOvl) {
      const src = modalMedia.querySelector("img,iframe");
      if (!src) return;
      const clone = src.cloneNode(true);
      clone.style.cssText = src.tagName==="IMG" ? "width:100%;height:100%;object-fit:contain;" : "width:100%;height:100%;border:none;";
      expandedCont.innerHTML = "";
      expandedCont.appendChild(clone);
      expandedOvl.style.display = "flex";
      document.documentElement.style.overflow = "hidden";
      setTimeout(() => document.getElementById("collapseMediaBtn")?.focus(), 100);
    }
    function collapseMedia(expandedOvl) {
      if (!expandedOvl) expandedOvl = document.getElementById("expandedMediaOverlay");
      if (expandedOvl) {
        expandedOvl.style.display = "none";
        const ec = document.getElementById("expandedMediaContent");
        if (ec) ec.innerHTML = "";
        const m = document.getElementById("project-overlay");
        if (m && m.getAttribute("aria-hidden")==="true") document.documentElement.style.overflow = "";
      }
    }
    function openProject(p) {
      if (!p) return;
      const overlay = document.getElementById("project-overlay");
      if (!overlay) return;
      overlay.setAttribute("aria-hidden","false");
      overlay.style.display = "flex";
      document.documentElement.style.overflow = "hidden";
      // Media
      const mm = document.getElementById("modalMedia");
      if (mm) {
        const hasIframe = p.link && p.link.includes('os.html');
        mm.innerHTML = (hasIframe
          ? `<iframe src="${p.link}" style="width:100%;height:100%;border:none;" title="${p.title||''} preview"></iframe>`
          : `<img src="${p.thumb||''}" alt="${p.title||''} preview" />`)
          + '<button class="expandMediaBtn" id="expandMediaBtn" type="button" aria-label="Expand preview"><span class="expandIcon">⛶</span></button>';
      }
      setupMediaExpand(p);
      // Icon
      const di = document.getElementById("detailIcon");
      if (di) {
        if (p.icon && !p.icon.includes('<')) di.textContent = p.icon;
        else if (p.logo && !p.logo.includes('<')) di.textContent = p.logo;
        else di.textContent = (p.title||'P').charAt(0).toUpperCase();
      }
      const dt = document.getElementById("detailTitle");      if (dt) dt.textContent = p.title||"Untitled";
      const dl = document.getElementById("detailLocation");   if (dl) dl.textContent = p.location||"—";
      const dd = document.getElementById("detailDate");       if (dd) dd.textContent = formatDateLong(p.date);
      // Chips
      const chips = document.getElementById("detailChips");
      if (chips) {
        const items = [];
        if (p.role) items.push(`Role: ${p.role}`);
        if (Array.isArray(p.stack)) items.push(...p.stack);
        chips.innerHTML = items.map(c=>`<span class="chip">${c}</span>`).join("");
      }
      // Overview
      const ov = document.getElementById("detailOverview");
      if (ov) ov.textContent = p.overview || p.description || "No overview yet.";
      // Links
      const ovLink = document.getElementById("detailOverviewLink");
      const lc     = document.getElementById("detailLinksContainer");
      if (ovLink && lc) {
        let list = Array.isArray(p.links) && p.links.length ? p.links : (p.link ? [{label:'View Project',url:p.link}] : []);
        if (list.length) {
          lc.innerHTML = list.map(l => {
            const ext = l.url && (l.url.startsWith('http://') || l.url.startsWith('https://'));
            return `<a href="${l.url}" target="${ext?'_blank':'_self'}" ${ext?'rel="noopener noreferrer"':''} class="projectLink"><span>${l.label||'View Project'}</span><span class="linkArrow">↗</span></a>`;
          }).join('');
          ovLink.style.display = 'block';
        } else { ovLink.style.display = 'none'; }
      }
      // Expand page
      const epc = document.getElementById("expandPageContainer");
      const epl = document.getElementById("expandPageLink");
      if (epc && epl) {
        const lu = p.link || (Array.isArray(p.links) && p.links.length ? p.links[0].url : null);
        if (lu && !lu.startsWith('http')) { epl.href = lu; epc.style.display = 'block'; }
        else epc.style.display = 'none';
      }
      // Releases
      const rels = Array.isArray(p.releases) ? p.releases : [];
      setSectionVisible("releasesSection", rels.length > 0);
      const re = document.getElementById("detailReleases");
      if (re) re.innerHTML = rels.map(r=>`<div class="releaseItem"><p class="releaseTitle">${r.title||''}</p>${r.note?`<p class="releaseNote">${r.note}</p>`:''}${r.url&&r.url!=='#'?`<a class="releaseLink" href="${r.url}" target="_blank" rel="noreferrer">↗ View</a>`:''}</div>`).join('');
      // Tweets
      const tw = Array.isArray(p.tweets) ? p.tweets : [];
      setSectionVisible("tweetsSection", tw.length > 0);
      const te = document.getElementById("detailTweets");
      if (te) te.innerHTML = tw.map(t=>`<div class="tweetCard"><div class="tweetTop"><div class="tweetAuthor"><div class="tweetName">${t.author||''}</div><div class="tweetHandle">${t.handle||''}</div></div><div>𝕏</div></div>${t.text?`<div class="tweetText">${t.text}</div>`:''}${t.media?`<div class="tweetMedia"><img src="${t.media}" alt="" loading="lazy"/></div>`:''}${t.url&&t.url!=='#'?`<a class="tweetLink" href="${t.url}" target="_blank" rel="noreferrer">↗ Open on X</a>`:''}</div>`).join('');
      // Highlights
      const hl = Array.isArray(p.highlights) ? p.highlights : [];
      setSectionVisible("highlightsSection", hl.length > 0);
      const he = document.getElementById("detailHighlights");
      if (he) he.innerHTML = hl.map(h=>`<li>${h}</li>`).join('');
    }
    // Modal close listeners
    document.getElementById("project-overlay").addEventListener("click", e => {
      if (e.target?.dataset?.close === "true") closeModal();
    });
    window.addEventListener("keydown", e => {
      const o = document.getElementById("project-overlay");
      if (e.key==="Escape" && o && o.getAttribute("aria-hidden")==="false") closeModal();
    });

    // ── Canvas state ───────────────────────────────────────────────────────
    const canvasBg = document.getElementById('canvasBg');
    const rwCanvas = document.getElementById('rwCanvas');
    const NODE_W = 260, NODE_H = 114;
    const PAD = 700; // offset so all logical coords are positive

    let tx = 0, ty = 0, scale = 0.85;
    let dragging = false, lastX = 0, lastY = 0;

    function applyTransform(animated) {
      if (animated) {
        rwCanvas.style.transition = 'transform 0.38s cubic-bezier(0.4,0,0.2,1)';
        setTimeout(() => { rwCanvas.style.transition = ''; }, 420);
      } else { rwCanvas.style.transition = ''; }
      rwCanvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
      document.getElementById('zoomLabel').textContent = Math.round(scale*100) + '%';
    }
    function resetView() {
      tx = canvasBg.offsetWidth  / 2 - PAD * scale;
      ty = canvasBg.offsetHeight / 2 - PAD * scale;
    }

    // ── Node positions (logical, centered at 0,0) ─────────────────────────
    // About Me lives at (0,0) — the center hub
    const nodeLayout = {
      'about-me':          { x:   0,  y:    0 },
      'portfolio-os':      { x:  20,  y: -430 },
      'lucentir':          { x: -460, y: -260 },
      'shadoconnect':      { x:  340, y: -290 },
      'ghost-job-checker': { x: -260, y: -120 },
      'wifi-analyzer':     { x: -540, y:  110 },
      'rentwise':          { x:  260, y:   80 },
      'jat':               { x:  510, y: -110 },
      'fluxdesk':          { x: -500, y:  330 },
      'wind-turbine':      { x: -130, y:  420 },
      'postnote':          { x:  220, y:  380 },
      'rx-check':          { x:  520, y:  200 },
    };

    // ── Edges — all projects connect to the About Me hub ──────────────────
    const EDGES = [
      ['about-me', 'portfolio-os'],
      ['about-me', 'lucentir'],
      ['about-me', 'shadoconnect'],
      ['about-me', 'ghost-job-checker'],
      ['about-me', 'wifi-analyzer'],
      ['about-me', 'rentwise'],
      ['about-me', 'jat'],
      ['about-me', 'fluxdesk'],
      ['about-me', 'wind-turbine'],
      ['about-me', 'postnote'],
      ['about-me', 'rx-check'],
    ];

    const nodeSummaries = {
      'portfolio-os':      'macOS-style desktop in the browser',
      'lucentir':          'AI-powered brand agency SaaS',
      'shadoconnect':      'mentorship matchmaking platform',
      'ghost-job-checker': 'fake job posting detector',
      'wifi-analyzer':     'network signal strength analyzer',
      'rentwise':          'smart apartment rent tracker',
      'jat':               'job application tracking dashboard',
      'fluxdesk':          'real-time helpdesk ticketing system',
      'wind-turbine':      'renewable energy data simulator',
      'postnote':          'quick collaborative sticky notes',
      'rx-check':          'FDA drug interaction checker',
    };
    function getNodeSummary(p) {
      return nodeSummaries[p.slug] || p.company || '';
    }
    function getStatus(p) {
      if (!p.link) return { cls:'github', label:'GitHub' };
      if (p.link.startsWith('http')) return { cls:'live', label:'Live' };
      return { cls:'local', label:'Local' };
    }
    function getIcon(p) {
      const l = p.logo || '';
      if (l && !l.includes('<')) return l;
      return (p.title||'P').charAt(0).toUpperCase();
    }

    function buildNode(project, delay) {
      const pos = nodeLayout[project.slug] || { x: Math.random()*600-300, y: Math.random()*400-200 };
      const st  = getStatus(project);
      const col = project.brandColor || '#6366F1';
      const node = document.createElement('div');
      node.className = 'rw-node';
      node.dataset.slug = project.slug;
      node.style.left = (PAD + pos.x - NODE_W/2) + 'px';
      node.style.top  = (PAD + pos.y - NODE_H/2) + 'px';
      node.style.animationDelay = delay + 'ms';
      node.innerHTML = `
        <div class="rw-node-inner">
          <div class="rw-node-header">
            <div class="rw-node-icon" style="background:${col}1A;color:${col};border:1px solid ${col}30;">${getIcon(project)}</div>
            <div class="rw-node-meta">
              <div class="rw-node-title">${project.title}</div>
              <div class="rw-node-sub">${getNodeSummary(project)}</div>
            </div>
          </div>
          <div class="rw-node-footer">
            <span class="rw-status-dot ${st.cls}"></span>
            <span class="rw-status-text">${st.label}</span>
          </div>
        </div>`;

      // ── Per-node drag ──────────────────────────────────────────────────
      let nodeDragging = false, nodeStartX = 0, nodeStartY = 0;
      let origLeft = 0, origTop = 0;

      node.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        e.stopPropagation(); // block canvas pan
        nodeDragging = false;
        nodeStartX = e.clientX;
        nodeStartY = e.clientY;
        origLeft = parseFloat(node.style.left);
        origTop  = parseFloat(node.style.top);

        function onMove(ev) {
          const dx = ev.clientX - nodeStartX;
          const dy = ev.clientY - nodeStartY;
          if (!nodeDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
            nodeDragging = true;
            node.style.zIndex = '20';
            node.style.transition = 'none';
          }
          if (nodeDragging) {
            node.style.left = (origLeft + dx / scale) + 'px';
            node.style.top  = (origTop  + dy / scale) + 'px';
            drawEdges();
          }
        }
        function onUp(ev) {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          node.style.zIndex = '';
          node.style.transition = '';
          if (!nodeDragging) {
            // It was a click — open project
            node.style.borderColor = col;
            setTimeout(() => { node.style.borderColor = ''; }, 250);
            openProject(project);
          }
          nodeDragging = false;
        }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });

      return node;
    }

    // drawEdges reads live node positions so edges follow dragged nodes
    function getNodeCenter(slug) {
      const el = rwCanvas.querySelector(`[data-slug="${slug}"]`);
      if (!el) return null;
      const w = parseFloat(getComputedStyle(el).width) || NODE_W;
      const h = parseFloat(getComputedStyle(el).height) || NODE_H;
      return {
        x: parseFloat(el.style.left) + w / 2,
        y: parseFloat(el.style.top)  + h / 2,
      };
    }

    function drawEdges() {
      const svg = document.getElementById('edgeLayer');
      svg.innerHTML = '';
      EDGES.forEach(([a, b]) => {
        const ca = getNodeCenter(a); const cb = getNodeCenter(b);
        if (!ca || !cb) return;
        const dy = cb.y - ca.y;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M${ca.x} ${ca.y} C${ca.x} ${ca.y+dy*0.5} ${cb.x} ${cb.y-dy*0.5} ${cb.x} ${cb.y}`);
        path.setAttribute('class', 'rw-edge');
        svg.appendChild(path);
      });
    }

    function buildAboutNode() {
      const pos = nodeLayout['about-me'];
      const node = document.createElement('div');
      node.className = 'rw-node hub';
      node.dataset.slug = 'about-me';
      node.style.left = (PAD + pos.x - 120) + 'px'; // 240/2
      node.style.top  = (PAD + pos.y - NODE_H/2 - 10) + 'px';
      node.style.animationDelay = '40ms';
      node.innerHTML = `
        <div class="rw-hub-body">
          <div class="rw-hub-header">
            <div class="rw-hub-avatar"><img src="favicon/android-chrome-192x192.png" alt="MA"></div>
            <div>
              <div class="rw-hub-name">Muhannad Abuzahrieh</div>
              <div class="rw-hub-role">Software Engineer</div>
            </div>
          </div>
          <div class="rw-hub-bio">First-gen CS grad building at the intersection of design and engineering.</div>
          <div class="rw-hub-footer">
            <span class="rw-hub-badge">Open to full-time</span>
            <span class="rw-hub-link">About Muhannad →</span>
          </div>
        </div>`;

      let hubDragging = false, hubStartX, hubStartY, hubOrigLeft, hubOrigTop;
      node.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        e.stopPropagation();
        hubDragging = false;
        hubStartX = e.clientX; hubStartY = e.clientY;
        hubOrigLeft = parseFloat(node.style.left);
        hubOrigTop  = parseFloat(node.style.top);
        function onMove(ev) {
          const dx = ev.clientX - hubStartX, dy = ev.clientY - hubStartY;
          if (!hubDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
            hubDragging = true; node.style.zIndex = '20'; node.style.transition = 'none';
          }
          if (hubDragging) {
            node.style.left = (hubOrigLeft + dx / scale) + 'px';
            node.style.top  = (hubOrigTop  + dy / scale) + 'px';
            drawEdges();
          }
        }
        function onUp() {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          node.style.zIndex = ''; node.style.transition = '';
          if (!hubDragging) window.location.href = 'about.html';
          hubDragging = false;
        }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });
      return node;
    }

    function initProjects() {
      const projects = [
        window.PortfolioOSProject, window.LucentirProject, window.ShadoconnectProject,
        window.RentwiseProject,    window.WifiAnalyzerProject, window.WindTurbineProject,
        window.PostNoteProject,    window.GhostJobCheckerProject, window.JATProject,
        window.FluxdeskProject,    window.RxCheckProject,
      ].filter(Boolean);

      document.getElementById('svcCount').textContent = `${projects.length} projects`;

      // About Me hub first (renders behind projects visually)
      rwCanvas.appendChild(buildAboutNode());

      projects.forEach((p, i) => {
        rwCanvas.appendChild(buildNode(p, 100 + i * 55));
      });

      drawEdges();
      resetView();
      applyTransform(false);
    }

    // ── Pan ────────────────────────────────────────────────────────────────
    canvasBg.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (e.target.closest('.rw-node')) return;
      dragging = true; lastX = e.clientX; lastY = e.clientY;
      canvasBg.classList.add('grabbing');
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      tx += e.clientX - lastX; ty += e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      applyTransform(false);
    });
    window.addEventListener('mouseup', () => { dragging = false; canvasBg.classList.remove('grabbing'); });

    // ── Zoom ───────────────────────────────────────────────────────────────
    canvasBg.addEventListener('wheel', e => {
      e.preventDefault();
      const d = e.deltaY > 0 ? 0.9 : 1.1;
      const r = canvasBg.getBoundingClientRect();
      const cx = e.clientX - r.left;
      const cy = e.clientY - r.top;
      tx = cx + (tx - cx) * d;
      ty = cy + (ty - cy) * d;
      scale = Math.min(Math.max(scale * d, 0.2), 3);
      applyTransform(false);
    }, { passive: false });

    // ── Touch pan ──────────────────────────────────────────────────────────
    let ltx = 0, lty = 0;
    canvasBg.addEventListener('touchstart', e => {
      if (e.touches.length===1) { ltx = e.touches[0].clientX; lty = e.touches[0].clientY; }
    }, { passive: true });
    canvasBg.addEventListener('touchmove', e => {
      if (e.touches.length===1) {
        tx += e.touches[0].clientX - ltx; ty += e.touches[0].clientY - lty;
        ltx = e.touches[0].clientX; lty = e.touches[0].clientY;
        applyTransform(false);
      }
    }, { passive: true });

    // ── Controls ───────────────────────────────────────────────────────────
    document.getElementById('ctrlZoomIn') .addEventListener('click', () => { scale = Math.min(scale*1.2,3);   applyTransform(true); });
    document.getElementById('ctrlZoomOut').addEventListener('click', () => { scale = Math.max(scale*0.8,0.2); applyTransform(true); });
    // ── Generate nether stars ─────────────────────────────────────────────
    (function spawnStars() {
      const bg = document.getElementById('canvasBg');
      const count = 45;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'nether-star';
        const size = 1.5 + Math.random() * 2;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top  = Math.random() * 100 + '%';
        star.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
        star.style.setProperty('--del', (Math.random() * 5) + 's');
        star.style.setProperty('--peak', (0.15 + Math.random() * 0.45).toFixed(2));
        star.style.setProperty('--grow', (1.2 + Math.random() * 0.6).toFixed(2));
        bg.appendChild(star);
      }
    })();

    window.addEventListener('load', initProjects);
  </script>

    };

    // ── Suggestions shown on open ────────────────────────────────────────────
    const SUGGESTIONS = [
      'Who is Muhannad?',
      'List all projects',
      'Is he available to hire?',
      'Tell me about Portfolio OS',
      'What tech stack does he use?',
    ];

    // ── Intent matching ───────────────────────────────────────────────────────
    function botReply(q) {
      const t = q.toLowerCase();

      // Greetings
      if (/^(hi|hello|hey|sup|yo|howdy|what'?s up)[\s!?]*$/.test(t.trim()))
        return `Hey! I'm Muhannad's portfolio assistant. I know everything about his background, projects, and skills — just ask. Or try one of the quick prompts below! 👇`;

      if (/thank|thanks|ty|great|awesome|perfect|appreciate/.test(t))
        return `Happy to help! If you want to connect with Muhannad directly, <a href="contact.html">send him a message</a> or find him on <a href="https://www.linkedin.com/in/muhannad-abuzahrieh-0b7330265/" target="_blank">LinkedIn ↗</a>.`;

      // ── Specific projects FIRST (before any general patterns) ──
      if (/portfolio.?os|os mode|desktop.?sim|macos.?sim|window manager|browser os|os project/.test(t)) return K.os;

      if (/rentwise|rent.?wise|rent.?track|apartment/.test(t)) return K.rentwise;
      if (/\bjat\b|job.?applic.?track|application.?tracker/.test(t)) return K.jat;

      if (/wind.?turb|turbine|renewable.?energy/.test(t)) return K.windturbine;

      if (/wi.?fi|wifi|network.?sec|network.?risk|public.?wifi/.test(t)) return K.wifi;

      if (/all projects|list.*project|what project|show.*project|projects.*built|projects.*made|what has he built|what did he build/.test(t)) return K.projects;

      if (/skill|tech stack|language|framework|what does he use|tools|experience with|what can he/.test(t)) return K.skills;
      if (/javascript|typescript|react|node\.?js|python|sqlite|express|indexeddb|canvas|webgl|railway|vercel/.test(t)) return K.tech;

      // Hiring / availability
      if (/hire|hiring|available|open to work|looking for|job|role|opportunity|full.?time|recruit/.test(t)) return K.available;

      // Contact
      if (/contact|reach|email|message|get in touch|linkedin|github/.test(t)) return K.contact;

      // Education
      if (/school|university|college|degree|graduated|first.gen|cs degree/.test(t)) return K.education;

      // Who / bio — LAST so "tell me about X project" hits project checks first
      if (/who is|about him|tell me about|introduce|background|bio|story/.test(t)) return K.who;

      // Most impressive / favorite project
      if (/most impressive|hardest|toughest|complex|best project|favorite|proudest/.test(t))
        return `Probably <b>Portfolio OS</b> — building a full operating system simulation in the browser with vanilla JS is no small feat. Window management, a virtual filesystem, a working terminal, sound effects, and multiple apps — all from scratch. But <b>Ghost Job Checker</b> is arguably the most <i>useful</i> one, already helping real job seekers.`;

      // What makes him different
      if (/different|unique|stand out|why hire|why him|what makes/.test(t))
        return `A few things: he built a full OS in the browser without a framework. He ships end-to-end — design, frontend, backend, deployment. He's first-gen, self-directed, and doesn't cut corners. And he cares about the craft — the animations are smooth, the UX is intentional, the code is readable.`;

    // ── Follow-up suggestions per topic ──────────────────────────────────────
    function getFollowUps(q) {
      const t = q.toLowerCase();
      if (/who|about|background|bio/.test(t))       return ['What projects has he built?','What are his skills?','Is he available to hire?'];
      if (/project|built|made/.test(t))              return ['Tell me about Portfolio OS','Tell me about Ghost Job Checker','Tell me about RxCheck'];

      if (/hire|available|job|role/.test(t))         return ['How can I contact him?','What are his skills?','List all projects'];
      if (/portfolio.?os|os mode/.test(t))           return ['Tell me about Ghost Job Checker','What tech stack does he use?','Is he available to hire?'];
      if (/ghost|fake.?job|extension/.test(t))       return ['Tell me about RxCheck','Tell me about Portfolio OS','Is he available to hire?'];
      if (/rxcheck|drug|fda/.test(t))               return ['Tell me about Ghost Job Checker','What tech does he use?','How can I contact him?'];
      return [];
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const panel     = document.getElementById('chatPanel');
    const toggleBtn = document.getElementById('chatToggleBtn');
    const closeBtn  = document.getElementById('chatCloseBtn');
    const messages  = document.getElementById('chatMessages');
    const input     = document.getElementById('chatInput');
    const sendBtn   = document.getElementById('chatSendBtn');
    const pillsEl   = document.getElementById('chatPills');

    let everOpened = false;

    function addMsg(html, role) {
      const div = document.createElement('div');
      div.className = 'rw-chat-msg ' + role;
      div.innerHTML = html;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const t = document.createElement('div');
      t.className = 'rw-chat-typing'; t.id = 'chatTyping';
      t.innerHTML = '<span></span><span></span><span></span>';
      messages.appendChild(t);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('chatTyping');
      if (t) t.remove();
    }

    function setPills(items) {
      pillsEl.innerHTML = '';
      items.forEach(s => {
        const pill = document.createElement('button');
        pill.className = 'rw-chat-pill';
        pill.textContent = s;
        pill.addEventListener('click', () => handleSend(s));
        pillsEl.appendChild(pill);
      });
    }

    function handleSend(q) {
      q = (q || input.value).trim();
      if (!q) return;
      input.value = '';
      pillsEl.innerHTML = '';
      addMsg(q, 'user');
      showTyping();
      const delay = 420 + Math.random() * 300;
      setTimeout(() => {
        removeTyping();
        addMsg(botReply(q), 'bot');
        const fu = getFollowUps(q);
        if (fu.length) setPills(fu);
      }, delay);
    }

    function openChat() {
      panel.classList.add('open');
      toggleBtn.classList.add('active');
      // Remove discovery pulse
      toggleBtn.classList.remove('bot-pulse');
      const beacon = document.getElementById('chatBeacon');
      if (beacon) beacon.remove();

          addMsg(`Hi! I'm Muhannad's portfolio assistant — I know his projects, background, and skills inside out. What would you like to know?`, 'bot');
          setPills(SUGGESTIONS);
        }, 100);
      }
    }

    function closeChat() {
      panel.classList.remove('open');
      toggleBtn.classList.remove('active');
    }

    toggleBtn.addEventListener('click', () => panel.classList.contains('open') ? closeChat() : openChat());
    closeBtn.addEventListener('click', closeChat);
    sendBtn.addEventListener('click', () => handleSend());
    input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

    // ── Discovery: pulse + floating tooltip after 2.5s ───────────────────────
    setTimeout(() => {
      if (everOpened) return;

      // Pulse ring on the button
      toggleBtn.classList.add('bot-pulse');

      // Floating beacon tooltip
      const beacon = document.createElement('div');
      beacon.id = 'chatBeacon';
      beacon.innerHTML = `<span>Ask me about Muhannad ✦</span>`;
      Object.assign(beacon.style, {
        position: 'fixed',
        bottom: '58px',
        left: 'calc(var(--sidebar-w) + 14px)',
        background: 'linear-gradient(135deg,#6366F1,#8B5CF6)',
        color: '#fff',
        fontSize: '12px',
        fontWeight: '600',
        padding: '7px 13px',
        borderRadius: '20px',
        zIndex: '400',
        boxShadow: '0 4px 20px rgba(99,102,241,0.45)',
        cursor: 'pointer',
        animation: 'beaconIn 0.35s cubic-bezier(0.34,1.3,0.64,1) forwards',
        whiteSpace: 'nowrap',
      });
      beacon.addEventListener('click', openChat);
      document.body.appendChild(beacon);

      // Auto-dismiss after 5s
      setTimeout(() => {
        if (document.getElementById('chatBeacon')) {
          beacon.style.transition = 'opacity 0.4s';
          beacon.style.opacity = '0';
          setTimeout(() => beacon.remove(), 400);
          toggleBtn.classList.remove('bot-pulse');
        }
      }, 5000);
    }, 2500);

  })();
  </script>
